name: shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          shellcheck --version
          # -x follows the sourced lib and .env.example.
          shellcheck -x -e SC1091 \
            lib/serverlib.sh \
            setup/palworld/install.sh \
            setup/ark-se/install.sh
