name: shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          shellcheck --version
          # Lint every shell script in the repo. -x follows sourced files
          # (the lib and .env.example); SC1091 = "sourced file not found".
          find . -name '*.sh' -print0 | xargs -0 -r shellcheck -x -e SC1091
