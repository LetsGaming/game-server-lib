# Lints every shell script on push. Remove this file if you don't want CI.
stages:
  - lint

shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  script:
    - shellcheck --version
    # -x follows the sourced lib; -e SC1091 avoids failing if the CI image
    # can't stat the sourced path.
    - shellcheck -x -e SC1091 lib/serverlib.sh palworld.sh ark-se.sh
