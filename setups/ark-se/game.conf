# ARK: Survival Evolved — source for Game.ini [/script/shootergame.shootergamemode].
#
# ONE Key=Value per line; '#' lines and blanks are ignored (comments on their
# own line only). The installer strips comments and writes the real Game.ini.
#
# IMPORTANT: breeding, imprinting and per-level multipliers ONLY work here, in
# Game.ini under [/script/shootergame.shootergamemode]. In GameUserSettings.ini's
# [ServerSettings] they are silently ignored and breeding stays on official
# (multi-day) rates no matter what you set.
#
# After changing this: stop the service, delete the generated
# ShooterGame/Saved/Config/LinuxServer/Game.ini, then re-run install.sh.

[/script/shootergame.shootergamemode]

# Breeding & imprinting — vanilla is brutally slow (a Rex is a multi-day raise);
# these bring it down to an evening. Direction is mixed on purpose:
#   speed multipliers go UP to go faster, interval multipliers go DOWN to go faster.
# Maturation and cuddle interval are paired so you can still hit 100% imprint;
# if you don't, raise BabyImprintAmountMultiplier or lower BabyCuddleIntervalMultiplier.
MatingIntervalMultiplier=0.1
MatingSpeedMultiplier=2.0
EggHatchSpeedMultiplier=25.0
BabyMatureSpeedMultiplier=25.0
BabyCuddleIntervalMultiplier=0.1
BabyImprintAmountMultiplier=3.0

# Farming — crops grow faster.
CropGrowthSpeedMultiplier=3.0
