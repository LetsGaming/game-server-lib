# ARK: Survival Evolved — source for GameUserSettings.ini [ServerSettings].
#
# ONE Key=Value per line; '#' lines and blanks are ignored. Comments must be on
# their OWN line (a trailing # would become part of the value). The installer
# strips the comments and writes the real GameUserSettings.ini; ARK rewrites
# that file on shutdown (dropping comments), which is why the commented copy
# lives here. Edit here, not the generated .ini.
#
# Identity (server name, passwords, player count, ports, map) is NOT here — it
# comes from .env and is passed on the launch command.
#
# After changing this: stop the service, delete the generated
# ShooterGame/Saved/Config/LinuxServer/GameUserSettings.ini, then re-run install.sh.
# Difficulty is tuned to a "hard world, casual grind" medium — see README.md.

[ServerSettings]

# Difficulty — max wild dino level = OverrideOfficialDifficulty x 30.
# 5.0 => wild dinos up to level 150 (a real threat for veterans). ARK's low
# defaults are why vanilla feels trivial. On an EXISTING world, run the admin
# command "DestroyWildDinos" once after changing this so dinos respawn at the
# new levels (a fresh world already spawns them correctly).
DifficultyOffset=1.0
OverrideOfficialDifficulty=5.0

# Rates — boosted to cut grind, NOT to trivialise combat (leave damage vanilla).
# Higher = more/faster. Vanilla taming and gathering are painfully slow.
XPMultiplier=2.0
TamingSpeedMultiplier=3.0
HarvestAmountMultiplier=2.0

# Quality of life. Set ServerPVE=True for a PvE (no player-vs-player) server.
ServerPVE=False
ShowMapPlayerLocation=True
ShowFloatingDamageText=True
AllowThirdPersonPlayer=True
