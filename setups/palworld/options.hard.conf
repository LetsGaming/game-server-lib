# Palworld world settings — HARD preset.
#
# Harder than options.conf, but deliberately not "one misstep and you're dead":
# no permadeath, no Pal loss, and damage taken stays well below the stock Hard
# preset's 4.0, which two-shots you. Instead of cranking one number, the
# difficulty is spread across several axes — fights run longer, recovery is
# slow, upkeep is real, raids bite. See README.md for the full table.
#
# Progression is untouched (XP, capture, gathering, work speed all 1.0): this is
# meant to be harder, not grindier.
#
# ONE Key=Value per line. Lines starting with # and blank lines are ignored.
# The installer flattens this into the single-line OptionSettings=(...) that
# PalWorldSettings.ini requires (Palworld's parser cannot read a multi-line ini),
# then patches in your .env values. Edit here, not the generated .ini.
#
# To use this preset, set in .env:
#   OPTIONS_FILE="options.hard.conf"
# then apply it with:
#   sudo ./reset.sh


# ── World & difficulty  (leave Difficulty=None — it means 'use these custom values') ──
Difficulty=None
RandomizerType=None
RandomizerSeed=""
bIsRandomizerPalLevelRandom=False

# ── Rates — time / xp / capture / spawn  (all 1.0 = no grind) ──
DayTimeSpeedRate=1.000000
NightTimeSpeedRate=1.000000
ExpRate=1.000000
PalCaptureRate=1.000000
PalSpawnNumRate=1.200000

# ── Combat — NOTE: higher *DamageRateDefense = MORE damage taken (harder) ──
PalDamageRateAttack=1.000000
PalDamageRateDefense=2.000000
PlayerDamageRateAttack=0.800000
PlayerDamageRateDefense=2.500000

# ── Survival — hunger / stamina / HP regen ──
PlayerStomachDecreaceRate=1.500000
PlayerStaminaDecreaceRate=1.500000
PlayerAutoHPRegeneRate=0.500000
PlayerAutoHpRegeneRateInSleep=0.500000
PalStomachDecreaceRate=1.500000
PalStaminaDecreaceRate=1.300000
PalAutoHPRegeneRate=0.500000
PalAutoHpRegeneRateInSleep=0.500000

# ── Building & gathering ──
BuildObjectHpRate=1.000000
BuildObjectDamageRate=1.500000
BuildObjectDeteriorationDamageRate=1.000000
CollectionDropRate=1.000000
CollectionObjectHpRate=1.000000
CollectionObjectRespawnSpeedRate=1.000000
EnemyDropItemRate=1.000000

# ── Death, PvP & world events ──
DeathPenalty=ItemAndEquipment
bEnablePlayerToPlayerDamage=False
bEnableFriendlyFire=False
bEnableInvaderEnemy=True
bActiveUNKO=False
bEnableAimAssistPad=True
bEnableAimAssistKeyboard=False

# ── Item drops & object limits ──
DropItemMaxNum=3000
PhysicsActiveDropItemMaxNum=-1
DropItemMaxNum_UNKO=100

# ── Base camps ──
BaseCampMaxNum=128
BaseCampWorkerMaxNum=15
DropItemAliveMaxHours=1.000000

# ── Guilds ──
bAutoResetGuildNoOnlinePlayers=False
AutoResetGuildTimeNoOnlinePlayers=72.000000
GuildPlayerMaxNum=20
BaseCampMaxNumInGuild=4

# ── Breeding, work speed & autosave ──
PalEggDefaultHatchingTime=1.000000
WorkSpeedRate=1.000000
AutoSaveSpan=30.000000

# ── World / session flags ──
bIsMultiplay=False
bIsPvP=False
bHardcore=False
bPalLost=False
bCharacterRecreateInHardcore=False
bCanPickupOtherGuildDeathPenaltyDrop=False
bEnableNonLoginPenalty=True
bEnableFastTravel=True
bEnableFastTravelOnlyBaseCamp=False
bIsStartLocationSelectByMap=False
bExistPlayerAfterLogout=False
bEnableDefenseOtherGuildPlayer=False
bInvisibleOtherGuildBaseCampAreaFX=False
bBuildAreaLimit=False
ItemWeightRate=1.000000
CoopPlayerMaxNum=4

# ── Server identity — ServerName / passwords / player count / port come from .env; edits here are OVERWRITTEN on install ──
ServerPlayerMaxNum=32
ServerName="Palworld Server"
ServerDescription=""
AdminPassword=""
ServerPassword=""

# ── Network, RCON & REST API ──
bAllowClientMod=True
PublicPort=8211
PublicIP=""
RCONEnabled=False
RCONPort=25575
Region=""
bUseAuth=True
BanListURL="https://b.palworldgame.com/api/banlist.txt"
RESTAPIEnabled=False
RESTAPIPort=8212
bShowPlayerList=False
